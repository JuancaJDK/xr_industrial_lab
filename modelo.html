<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>

    <div style="position: absolute; top: 20px; left: 20px; z-index: 999;">
      <a href="index.html" style="
        background-color: white; 
        padding: 10px 20px; 
        text-decoration: none; 
        color: #E74C3C; 
        font-family: sans-serif; 
        border-radius: 5px;
        font-weight: bold;
        border: 2px solid #E74C3C;">
        ← Volver al Menú
      </a>
    </div>

    <a-scene>
      
      <a-assets>
        <a-asset-item id="modeloIndustrial" src="models/modelo.glb"></a-asset-item>
      </a-assets>

      <a-sky color="#ECECEC"></a-sky>
      <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#7BC8A4"></a-plane>

      <a-entity id="rig" position="0 0 5">
        <a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>
      </a-entity>

      <a-entity gltf-model="#modeloIndustrial" 
                position="0 0.2 -5" 
                scale="1 1 1"
                rotation="0 0 0">
      </a-entity>

      <a-entity light="type: ambient; intensity: 0.8"></a-entity>
      <a-entity light="type: directional; intensity: 0.5" position="2 4 2"></a-entity>

    </a-scene>
  </body>
</html>
