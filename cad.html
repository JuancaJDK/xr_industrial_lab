<!DOCTYPE html>
<html>
  <head>
    <title>Modelo CAD - Parte D</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  </head>
  <body>

    <div style="position: absolute; top: 20px; left: 20px; z-index: 999;">
        <a href="index.html" style="
          background-color: white; 
          padding: 10px 20px; 
          text-decoration: none; 
          color: #2C3E50; 
          font-family: sans-serif; 
          border-radius: 5px;
          font-weight: bold;
          border: 2px solid #2C3E50;">
          ← Volver al Menú
        </a>
    </div>

    <a-scene>
      <a-assets>
        <a-asset-item id="modeloCAD" src="models/modelo.glb"></a-asset-item>
      </a-assets>

      <a-sky color="#ECECEC"></a-sky>

      <a-entity id="rig" position="0 0 20">
        <a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>
      </a-entity>

      <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#7BC8A4"></a-plane>

      <a-entity gltf-model="#modeloCAD" 
                position="0 0 -5" 
                scale="1 1 1"
                rotation="0 0 0">
      </a-entity>

      <a-entity light="type: ambient; intensity: 0.8"></a-entity>
      <a-entity light="type: directional; intensity: 0.6" position="2 4 3"></a-entity>

    </a-scene>
  </body>
</html>
