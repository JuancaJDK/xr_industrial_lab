<!DOCTYPE html>
<html>
<head>
  <title>Menú Principal - Proyecto A-Frame</title>
  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
</head>
<body>

  <a-scene>
    <a-box position="0 1 -3" rotation="0 45 0" color="#4CC3D9"></a-box>
    <a-sphere position="2 1 -4" radius="1" color="#EF2D5E"></a-sphere>
    <a-cylinder position="-2 1 -4" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
    <a-plane rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>
    <a-sky color="#ECECEC"></a-sky>
  </a-scene>

  <div style="position: absolute; top: 20px; left: 20px; z-index: 999; display: flex; flex-direction: column; gap: 15px;">
    
    <a href="industrial.html" style="
      background-color: white; 
      padding: 15px 25px; 
      text-decoration: none; 
      color: #2C3E50; 
      font-family: sans-serif; 
      border-radius: 8px; 
      font-weight: bold; 
      border: 3px solid #3498DB;
      text-align: center;">
      Ir al Modelo Industrial (Parte C)
    </a>

    <a href="cad.html" style="
      background-color: white; 
      padding: 15px 25px; 
      text-decoration: none; 
      color: #2C3E50; 
      font-family: sans-serif; 
      border-radius: 8px; 
      font-weight: bold; 
      border: 3px solid #2ECC71;
      text-align: center;">
      Ir al Modelo CAD SolidWorks (Parte D)
    </a>

  </div>

</body>
</html>
