<!DOCTYPE html>
<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.1/dist/aframe-master.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>

      <a-entity id="tanque_sistema" position="-1 0 -3">
        <a-cylinder position="0 1.5 0" radius="1" height="3" color="#95A5A6"></a-cylinder>
        <a-cylinder position="0 3 0" radius="0.1" height="1" color="#34495E"></a-cylinder>
      </a-entity>

      <a-entity id="panel_control" position="1.5 0 -2">
        <a-box position="0 0.75 0" width="0.5" height="1.5" depth="0.2" color="#2C3E50"></a-box>
        
        <a-box position="0 1.2 0.1" width="0.4" height="0.3" depth="0.05" color="#ECF0F1">
            <a-sphere position="-0.1 0 0.03" radius="0.03" color="#E74C3C"></a-sphere> <a-sphere position="0.1 0 0.03" radius="0.03" color="#2ECC71"></a-sphere>  </a-box>
      </a-entity>

      <a-sky color="#ECECEC"></a-sky>
      <a-entity camera look-controls position="0 1.6 2"></a-entity>
    </a-scene>
  </body>
</html>
