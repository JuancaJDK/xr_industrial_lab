<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <div style="position: absolute; top: 20px; left: 20px; z-index: 999;">
        <a href="index.html" style="
          background-color: white; 
          padding: 10px 20px; 
          text-decoration: none; 
          color: #2C3E50; 
          font-family: sans-serif; 
          border-radius: 5px;
          font-weight: bold;
          border: 2px solid #2C3E50;">
          Volver al Menú
        </a>
    </div>

    <a-scene>
      <a-sky color="#ECECEC"></a-sky>

      <a-entity id="rig" position="0 0 4">
        <a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>
      </a-entity>

      <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#7BC8A4"></a-plane>

      <a-entity id="tanque_sistema" position="-2 0 -5">
        <a-cylinder position="0 1.5 0" radius="1.2" height="3" color="#95A5A6"></a-cylinder>
        <a-cylinder position="0 3.2 0" radius="0.15" height="1.2" color="#34495E"></a-cylinder>
      </a-entity>

      <a-entity id="panel_control" position="2 0 -3">
        <a-box position="0 0.75 0" width="0.6" height="1.5" depth="0.3" color="#2C3E50"></a-box>
        <a-box position="0 1.2 0.16" width="0.5" height="0.4" depth="0.05" color="#ECF0F1">
            <a-sphere position="-0.12 0 0.03" radius="0.04" color="#E74C3C"></a-sphere>
            <a-sphere position="0.12 0 0.03" radius="0.04" color="#2ECC71"></a-sphere>
        </a-box>
      </a-entity>

    </a-scene>
  </body>
</html>
